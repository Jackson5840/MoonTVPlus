services:
  - type: web
    name: moonstartv
    runtime: image
    plan: free
    image:
      url: ghcr.io/jackson5840/moonstartv:latest
    envVars:
      - key: USERNAME
        sync: false
      - key: PASSWORD
        sync: false
      - key: NEXT_PUBLIC_SITE_NAME
        value: StarTV
      - key: CRON_PASSWORD
        value: mtvpls
